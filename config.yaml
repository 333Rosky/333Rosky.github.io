baseURL: "https://333rosky.github.io/"
title: "Romain Bastiani"
languageCode: "en"
theme: "PaperMod"

# Génération dans docs/ pour GitHub Pages (paramétrable côté Pages)
publishDir: "docs"
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

pagination:
  pagerSize: 10
enableRobotsTXT: true
canonifyURLs: false
disableKinds:
  - taxonomy
  - term

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "Romain Bastiani"
  description: "Quantitative Researcher."
  keywords: ["Quantitative Researcher", "Python", "Finance"]
  author: "Romain Bastiani"
  DateFormat: "2006-01-02"
  defaultTheme: dark
  disableThemeToggle: true
  ShowBreadCrumbs: true
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  disableLangToggle: true
  disableScrollToTop: true
  comments: false

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"
    theme_color: "#050505"
    msapplication_TileColor: "#050505"

  profileMode:
    enabled: true
    title: "Romain Bastiani"
    subtitle: "Quantitative Researcher"
    imageUrl: "/Linkedin PP.jpg"
    imageTitle: "Profile photo"

  socialIcons:
    - name: github
      url: "https://github.com/333Rosky"
    - name: linkedin
      url: "https://www.linkedin.com/in/romain-bastiani-118072173/"

permalinks:
  posts: "/posts/:slug/"

markup:
  goldmark:
    renderer:
      unsafe: true

privacy:
  youtube:
    privacyEnhanced: true
  x:
    enableDNT: true

languages:
  en:
    languageName: "English"
    languageCode: "en"
    contentDir: "content/en"
    menu:
      main:
        - identifier: en-home
          name: "Home"
          url: "/"
          weight: 1
        - identifier: en-experience
          name: "Experience"
          url: "/experience/"
          weight: 2
        - identifier: en-projects
          name: "Projects"
          url: "/projects/"
          weight: 3
        - identifier: en-cv
          name: "CV"
          url: "/Romain Bastiani Resume.pdf"
          weight: 4
    params:
      profileMode:
        buttons:
          - name: "Projects"
            url: "/projects/"
          - name: "CV"
            url: "/Romain Bastiani Resume.pdf"
